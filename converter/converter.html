<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Converter</title>
    <link rel="stylesheet" href="converter.css"/>
</head>
<body>
    <h1>💸--- КОНВЕРТЕР ВАЛЮТ ---💸</h1>
    <div class="main">

        <div class="input">
            <input type="number" id="input" placeholder="Введите сумму для конвертирования" required>
        <select required id="currency_input">
          <option value="" disabled selected>-- Выберите валюту --</option>
          <option value="USD">USD — Доллар США</option>
          <option value="EUR">EUR — Евро</option>
          <option value="GBP">GBP — Британский фунт</option>
          <option value="JPY">JPY — Японская иена</option>
          <option value="RUB">RUB — Российский рубль</option>
          <option value="CNY">CNY — Китайский юань</option>
        </select>
        </div>

        <div class="button-converter">
            <button class="button-green" id="button-green">Конвертировать</button>
        </div>

        <div class="output">
            <input type="number" id="output" placeholder="Конвертированная сумма..." readonly>
        <select required id="currency_output">
          <option value="" disabled selected>-- Выберите валюту --</option>
          <option value="USD">USD — Доллар США</option>
          <option value="EUR">EUR — Евро</option>
          <option value="GBP">GBP — Британский фунт</option>
          <option value="JPY">JPY — Японская иена</option>
          <option value="RUB">RUB — Российский рубль</option>
          <option value="CNY">CNY — Китайский юань</option>
        </select>
        </div>


        <div class="button-clear">
            <button class="button-red" id="button-red">Очистить</button>
        </div>
    </div>

    <script src="converter.js"></script>
</body>
</html>
